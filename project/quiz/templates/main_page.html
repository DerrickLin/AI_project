<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無人商店</title>
    <style>
        body {
            background-color: #f9f3db; /* 黄色为基底 */
            color: #333; /* 黑色文字 */
            font-family: Arial, sans-serif; /* 字体设置 */
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4caf50; /* 绿色顶部导航栏 */
            color: #fff; /* 白色文字 */
            padding: 10px;
            text-align: center;
        }
        main {
            padding: 20px;
            display: flex;
            justify-content: space-between; /* 将内容放置于左右两侧 */
            flex-wrap: wrap; /* 允许内容换行 */
        }
        section {
            margin-bottom: 30px;
            width: 45%; /* 设置每个部分的宽度 */
        }
        .shopping-cart, .recommended-products {
            background-color: #fff; /* 白色购物车和推荐商品背景 */
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4caf50; /* 绿色按钮背景 */
            color: #fff; /* 白色文字 */
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #45a049; /* 深绿色按钮背景 */
        }
    </style>
</head>
<body>
    <header>
        <h1>無人商店</h1>
    </header>
    <main>
        <div style="width: 100%; text-align: center;">
            {% if request.user.is_authenticated %}
                <p>哈嘍！ 歡迎{{request.user}} ，您已經登入囉~</p>
            {% endif %}
        </div>
        
        <section style="margin-right: 20px;">
            <h2>購物車</h2>
            <div class="shopping-cart">
                <!-- 这里放置购物车内容 -->
                <p>购物车内容</p>
            </div>
        </section>
        <section style="margin-left: 20px;">
            <h2>推薦商品</h2>
            <div class="recommended-products">
                <!-- 这里放置推荐商品内容 -->
                <p>推荐商品内容</p>
            </div>
        </section>
    </main>
    <footer>
        <p><a href="{% url 'log_out' %}" class="button logout-button">登出</a></p>
    </footer>
</body>
</html>
